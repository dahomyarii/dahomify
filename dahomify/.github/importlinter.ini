[importlinter]
root_package = desloppify

[contract:runtime_must_not_depend_on_tests]
name = Runtime modules must not import test modules
type = forbidden
source_modules =
    desloppify.app
    desloppify.core
    desloppify.engine
    desloppify.intelligence
    desloppify.languages
forbidden_modules =
    desloppify.tests
