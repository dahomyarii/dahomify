name: Integration

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  roslyn-integration:
    runs-on: ubuntu-latest
    env:
      DESLOPPIFY_TEST_CSHARP_ROSLYN_CMD: "python .github/scripts/roslyn_stub.py"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Run deterministic Roslyn integration lane
        run: make integration-roslyn
